version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: telegram-file-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./files:/app/files
      - ./file_mappings.json:/app/file_mappings.json
      - ./logs:/app/logs
    ports:
      - "8443:8443"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8443/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s